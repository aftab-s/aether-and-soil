<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a46e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b05c3a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dark espresso background -->
  <rect width="100" height="100" fill="#1a0f0a" rx="20"/>
  
  <!-- Coffee bean shape - left -->
  <ellipse cx="32" cy="50" rx="16" ry="28" fill="url(#beanGradient)" opacity="0.95"/>
  
  <!-- Coffee bean shape - right -->
  <ellipse cx="68" cy="50" rx="16" ry="28" fill="url(#beanGradient)" opacity="0.85"/>
  
  <!-- Subtle center line separating beans -->
  <path d="M 50 22 Q 48 50 50 78" stroke="#c9a46e" stroke-width="1.2" fill="none" opacity="0.5"/>
  
  <!-- Small accent marks for elegance -->
  <circle cx="32" cy="35" r="2.5" fill="#c9a46e" opacity="0.6"/>
  <circle cx="68" cy="35" r="2.5" fill="#c9a46e" opacity="0.6"/>
</svg>